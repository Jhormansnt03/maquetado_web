<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- La etiqute table se utiliza para definir tablas en html. Todo el contenido de la tabla, incluidas las filas y celdas, se coloca dentro de esta etiqueta -->
    
    <!-- La etiqueta tr define una fila en la tabla, cada fila puede contener uno mas celdas, que se definen con la etiqueta td(para celda de datos) o th (para celda de encabezado)-->

    <!-- la etiqueta td define una celda de datos en la tabla -->

    <!-- la etiqueta th define una celda de encabezado en la tabla -->


    <table border="1" style="text-align: center;">
        <tr>
            <th>Encabezado 1</th>
            <th>Encabezado 2</th>
            <th>Encabezado 3</th>
        </tr>
        <tr>
            <td>selecciona
                <br>una opcion
                <ol>
                    <li>SI</li>
                    <li>NO</li>
                </ol>
            </td>
            <td>Dato 2</td>
            <td>Dato 3</td>
        </tr>
        <tr>
            <td>Dato 4</td>
            <td>Dato 5</td>
            <td>Dato 6</td>
        </tr>
    </table>

    <br>

    <table border="1">
        <caption>paises y capitales</caption>
        <tr>
            <th>Pais</th>
            <th>Capital</th>
        </tr>
        <tr>
            <td>Colombia</td>
            <td>Bogota</td>
        </tr>
        <tr>
            <td>Peru</td>
            <td>Lima</td>
        </tr>
        <tr>
            <td>italia</td>
            <td>Roma</td>
        </tr>
    </table>
    
    <br>

    <table border="1">
        <tr>
            <th colspan="3">Mundial de Futbol</th>
        </tr>
        <tr>
            <td rowspan="3">paises con mayoria de goles</td>
            <td>Brasil 2</td> <td>238</td>   
        </tr>
        <tr>
            <td>Alemania </td> <td>180</td>
        </tr>
        <tr>
            <td>Argentina</td> <td>150</td>
        </tr>
    </table>




</body>
</html>
