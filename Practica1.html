<!doctype html>

<!-- Indica el tipo de documento.
Le dice al navegador que estás usando HTML5, que es la versión actual del lenguaje. -->

<html lang="en">
  <!-- especifica el idioma del contenido (en este caso, inglés).
Esto ayuda a navegadores, lectores de pantalla y SEO. -->

  <head>
    <!-- Contiene información interna del documento, que no se muestra directamente en la página, pero es importante para su funcionamiento. -->

    <meta charset="UTF-8" />
    <!-- permite usar tildes, ñ, símbolos, emojis, etc. (Muy importante para evitar errores de texto). -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Hace que la página sea responsive (adaptable a celulares y tablets)width=device-width → ajusta el ancho al dispositivo. initial-scale=1.0 → controla el zoom inicial -->

    <title>Document</title>
    <!-- Define el título de la página, el que aparece en la pestaña del navegador. -->
  </head>
  <body>
    <!-- Aquí va todo el contenido visible de la página:
    texto
    imágenes
    botones
    formularios
    etc. -->
  </body>
</html>
