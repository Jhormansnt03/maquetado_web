<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista con li</title>
</head>
<body>

    <!-- 
        ul = contenedor de lista desordenada
        Agrupa los elementos de la lista
    -->
    <ul>
        
        <!-- 
            li = "list item"
            Representa cada elemento de la lista
        -->
        <li>Elemento 1</li>
        
        <!-- Otro elemento de la lista -->
        <li>Elemento 2</li>
        
        <!-- Otro elemento de la lista -->
        <li>Elemento 3</li>

    </ul>

</body>
</html>
